<!DOCTYPE html>
<html>
<body>

<h2>Reconhecimento com IA</h2>

<video id="video" autoplay playsinline width="400"></video>
<br><br>

<button onclick="predict()">Analisar</button>

<h3 id="result">Aguardando...</h3>
  
<script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@3.21.0"></script>
<script src="https://cdn.jsdelivr.net/npm/@teachablemachine/image@0.8/dist/teachablemachine-image.min.js"></script>
  
<script>
const video = document.getElementById("video");
const result = document.getElementById("result");

let model = null;

// iniciar câmera
navigator.mediaDevices.getUserMedia({ video: true })
  .then(stream => {
    video.srcObject = stream;
  })
  .catch(err => {
    result.innerText = "Erro ao acessar câmera";
    console.error(err);
  });

// carregar modelo
async function loadModel() {
  try {
    result.innerText = "Carregando modelo...";

    const URL = "model/";

    model = await tmImage.load(
      URL + "model.json",
      URL + "metadata.json"
    );

    result.innerText = "Modelo carregado. Clique em analisar.";

  } catch (error) {
    console.error("ERRO AO CARREGAR:", error);
    result.innerText = "Erro ao carregar modelo";
  }
}

// analisar imagem
async function predict() {
  try {

    if (!model) {
      await loadModel();
    }

    if (!model) return;

    result.innerText = "Analisando...";

    const prediction = await model.predict(video);

    let best = prediction[0];

    for (let i = 1; i < prediction.length; i++) {
      if (prediction[i].probability > best.probability) {
        best = prediction[i];
      }
    }

    result.innerText = "Detectado: " + best.className;

  } catch (error) {
    console.error("ERRO NA PREVISÃO:", error);
    result.innerText = "Erro ao analisar";
  }
}
</script>

</body>
</html>
