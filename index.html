<!DOCTYPE html>
<html>

<head>
  <title>IA Reconhecimento - v1.3</title>
</head>

<body>

<h1 id="version"></h1>

<h2>Reconhecimento com IA</h2>

<video id="video" autoplay playsinline width="400"></video>

<br><br>

<h3 id="result">Aguardando...</h3>

<img id="outputImage" width="300">

<script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@3.21.0"></script>
<script src="https://cdn.jsdelivr.net/npm/@teachablemachine/image@0.8/dist/teachablemachine-image.min.js"></script>

<script>
const video = document.getElementById("video");
const result = document.getElementById("result");
const outputImage = document.getElementById("outputImage");

// versão
const version = "v1.2";
document.getElementById("version").innerText =
  "Versão: " + version + " | " + new Date().toLocaleTimeString();

let model = null;

// banco de imagens
const imagens = {
  cachorro: "https://placedog.net/400",
  gato: "https://placekitten.com/400/400",
  carro: "https://source.unsplash.com/400x400/?car",
  casa: "https://source.unsplash.com/400x400/?house"
};

// iniciar câmera
navigator.mediaDevices.getUserMedia({ video: true })
  .then(stream => {
    video.srcObject = stream;
  })
  .catch(err => {
    result.innerText = "Erro ao acessar câmera";
    console.error(err);
  });

// carregar modelo
async function loadModel() {
  try {
    result.innerText = "Carregando modelo...";

    const URL = "model/";

    model = await tmImage.load(
      URL + "model.json",
      URL + "metadata.json"
    );

    result.innerText = "Modelo carregado!";
    loop();

  } catch (error) {
    console.error(error);
    result.innerText = "Erro ao carregar modelo";
  }
}

// loop contínuo
async function loop() {
  if (!model) return;

  try {
    const prediction = await model.predict(video);

    let best = prediction[0];

    for (let i = 1; i < prediction.length; i++) {
      if (prediction[i].probability > best.probability) {
        best = prediction[i];
      }
    }

    result.innerText = "Detectado: " + best.className;

    // troca imagem
    if (imagens[best.className]) {
      outputImage.src = imagens[best.className];
    }

  } catch (error) {
    console.error(error);
    result.innerText = "Erro ao analisar";
  }

  setTimeout(loop, 500);
}

// iniciar
loadModel();
</script>

</body>
</html>
