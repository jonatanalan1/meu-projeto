const video = document.getElementById("video");

document.getElementById("version").innerText =

let model = null;

// iniciar câmera
navigator.mediaDevices.getUserMedia({ video: true })
  .then(stream => {
    video.srcObject = stream;
  })
  .catch(err => {
    result.innerText = "Erro ao acessar câmera";
    console.error(err);
  });

// carregar modelo

async function loop() {

  try {
    const prediction = await model.predict(video);

    let best = prediction[0];

    for (let i = 1; i < prediction.length; i++) {
      if (prediction[i].probability > best.probability) {
        best = prediction[i];
      }
    }

    let nome = best.className.toLowerCase().trim();

    result.innerText = "Detectado: " + nome;

    // GERAR PROMPT
    let prompt = "desenho infantil de " + nome;

    // MOSTRAR PROMPT
    promptBox.innerText = "Prompt: " + prompt;

  } catch (error) {
    console.error(error);
    result.innerText = "Erro ao analisar";
  }

  setTimeout(loop, 500);
}
